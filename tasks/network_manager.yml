---

- name: Install network-manager
  become: true
  ansible.builtin.package:
    name: network-manager
    state: present

- name: Switch Netplan renderer to NetworkManager
  become: true
  ansible.builtin.lineinfile:
    path: /etc/netplan/50-cloud-init.yaml
    regexp: '^\s*renderer:\s*networkd'
    line: '  renderer: NetworkManager'
    backrefs: true
  register: netplan_change

- name: Test netplan config
  become: true
  ansible.builtin.command:
    cmd: netplan try --timeout 10
  ignore_errors: true
  register: netplan_config_test
  changed_when: false

- name: Evaluate config test result
  ansible.builtin.assert:
    that:
      - not netplan_config_test.failed
    msg: "netplan config seems to be faulty, run `netplan try --timeout 10` manually to check results"
    quiet: true

- name: Apply netplan
  become: true
  when: netplan_change.changed  # noqa: no-handler
  ansible.builtin.command:
    cmd: netplan apply
  register: netplan_apply_result
  changed_when: netplan_apply_result.rc == 0

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Disable and mask obsolete services
  become: true
  loop: "{{ system_packages_disabled_services }}"
  loop_control:
    loop_var: "service"
  when: service in ansible_facts.services.keys()
  ansible.builtin.systemd_service:
    name: "{{ service }}"
    state: stopped
    enabled: false
    masked: true

...
