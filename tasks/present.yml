---

- name: Load repository list from YAML file
  ansible.builtin.include_vars:
    file: "{{ system_packages_repo_config }}"

- name: Load packages list from YAML file
  ansible.builtin.include_vars:
    file: "{{ system_packages_config }}"

- name: Include repo files logic
  ansible.builtin.include_tasks:
    file: "{{ ansible_os_family | lower }}_repos.yml"

- name: Install packages
  become: true
  when: system_packages_list[ansible_facts.distribution | lower] is defined
  ansible.builtin.package:
    name: "{{ system_packages_list[ansible_facts.distribution | lower] | flatten(1) }}"
    update_cache: true
  register: package_install_result
  # Note tuxedo repos fails on first try
  retries: 3
  delay: 2
  until: package_install_result is succeeded

- name: Install custom packages (usually device specific)
  become: true
  loop: "{{ system_packages_custom_packages }}"
  loop_control:
    loop_var: custom_package
  ansible.builtin.package:
    name: "{{ custom_package }}"
    state: present

- name: Update netplan config
  when: system_packages_network_manager
  ansible.builtin.include_tasks:
    file: network_manager.yml

...
